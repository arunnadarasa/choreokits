# Local Midnight standalone stack — Docker Desktop only.
#
# Mirrors the official midnightntwrk/midnight-local-dev `standalone.yml`.
# Brings up:
#   - proof-server   :6300  (generates ZK proofs for tx submission)
#   - node           :9944  (single-node dev chain, CFG_PRESET=dev)
#   - indexer        :8088  (GraphQL over the node — /api/v4/graphql)
#
# Point Lace at ws://localhost:9944.
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f proof-server
#   docker compose down          # stop
#   docker compose down -v       # stop + wipe chain data

services:
  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    container_name: midnight-proof-server
    command: ["midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    environment:
      RUST_BACKTRACE: "full"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/6300"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  node:
    # Pinned to the same tag the official midnight-local-dev standalone uses.
    # Do NOT swap to a 2.x tag — those are Partner Chain builds that require
    # Cardano db-sync or a mock_registrations_file and will crash-loop.
    image: midnightntwrk/midnight-node:0.22.5
    container_name: midnight-node
    environment:
      CFG_PRESET: "dev"
      SIDECHAIN_BLOCK_BENEFICIARY: "04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e"
    ports:
      - "9944:9944"
    volumes:
      - midnight-node-data:/node/chain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s
    # Fail fast instead of hiding crashes in a restart loop — the deploy script
    # inspects container state and surfaces the real error immediately.
    restart: "no"

  indexer:
    image: midnightntwrk/indexer-standalone:4.0.2
    container_name: midnight-indexer
    depends_on:
      node:
        condition: service_healthy
    environment:
      RUST_LOG: "indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=off,info"
      APP__INFRA__NODE__URL: "ws://node:9944"
      APP__APPLICATION__NETWORK_ID: "undeployed"
      APP__INFRA__STORAGE__PASSWORD: "indexer"
      APP__INFRA__PUB_SUB__PASSWORD: "indexer"
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: "indexer"
      APP__INFRA__SECRET: "303132333435363738393031323334353637383930313233343536373839303132"
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "cat /var/run/indexer-standalone/running"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  midnight-node-data:
