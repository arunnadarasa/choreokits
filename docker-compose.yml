# Local Midnight standalone stack — Docker Desktop only.
#
# Brings up:
#   - proof-server   :6300  (generates ZK proofs for tx submission)
#   - node           :9944  (single-node dev chain, unlimited tDUST genesis wallet)
#   - indexer        :8088  (GraphQL over the node — /api/v3/graphql)
#
# Ports match .env.example. Point Lace at ws://localhost:9944.
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f proof-server
#   docker compose down          # stop
#   docker compose down -v       # stop + wipe chain data

services:
  proof-server:
    image: midnightntwrk/proof-server:latest
    container_name: midnight-proof-server
    command: midnight-proof-server -v
    ports:
      - "6300:6300"
    restart: unless-stopped

  node:
    # Upstream does NOT publish `midnightntwrk/midnight-node:latest`.
    # Pin to a known-good release compatible with Compact 0.23 / MidnightJS 4.1.x.
    # If this tag ever gets yanked, fall back to `latest-main` (rolling dev tag).
    image: midnightntwrk/midnight-node:2.0.0-rc.4
    container_name: midnight-node
    environment:
      # 2.0.0-rc.4 is a Partner Chain build. Without this it tries to connect to
      # a Cardano db-sync Postgres and crash-loops with:
      #   "db_sync_postgres_connection_string must be defined if ariadne is enabled"
      # Enabling the mock main-chain follower keeps the standalone --dev chain
      # self-contained (no Cardano, no Postgres).
      USE_MAIN_CHAIN_FOLLOWER_MOCK: "true"
      APP__MAIN_CHAIN_FOLLOWER_MOCK__ENABLED: "true"
      SHOW_SECRETS: "1"
    command:
      - "--dev"
      - "--rpc-external"
      - "--ws-external"
      - "--rpc-cors=all"
      - "--rpc-methods=unsafe"
      - "--base-path=/data"
    ports:
      - "9944:9944"
      - "9933:9933"
    volumes:
      - midnight-node-data:/data
    # Fail fast instead of hiding crashes in a restart loop — the deploy script
    # inspects container state and surfaces the real error immediately.
    restart: "no"


  indexer:
    image: midnightntwrk/indexer-standalone:4.3.3
    container_name: midnight-indexer
    depends_on:
      - node
    environment:
      APP__INFRA__NODE__URL: "ws://node:9944"
      RUST_LOG: "info"
    ports:
      - "8088:8088"
    restart: unless-stopped

volumes:
  midnight-node-data:
